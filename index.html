<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">

  
  <title>Frontend Mentor | Results summary component</title>

</head>
<body>
  <main class="container">
    <div class="card">
      <div class="card-result">
        <div class="result-text">
          <h1>Your Result</h1>
          <div id="circle">
            <strong>76</strong>
            <p>of 100</p>
          </div>
          <h2>Great</h2>
          <p>You scored higher than 65% of the people who have taken these tests.<p>
        </div>
      </div>
      <div class="card-sumary">
        <h1>Summary</h1>
        <div class="list-result">
          <ul>
            <li class="reaction"><img src="assets/images/icon-reaction.svg" alt=""><span>Reaction</span><p><b>80</b>/100</p></li>
            <li class="memory"><img src="assets/images/icon-memory.svg" alt=""><span>Memory</span><p><b>92</b>/100</p></li>
            <li class="verbal"><img src="assets/images/icon-verbal.svg" alt=""><span>Verbal</span><p><b>61</b>/100</p></li>
            <li class="visual"><img src="assets/images/icon-visual.svg" alt=""><span>Visual</span><p>72/100</p></li>
          </ul>
        </div>
        <button class="btn">Continue</button>
      </div>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io" target="_blank">Frontend Mentor</a>. Coded by <a href="https://www.linkedin.com/in/jo%C3%A3o-vitor-62b518263/" target="_blank">João Vitor</a>
  </footer>
</body>
</html>
